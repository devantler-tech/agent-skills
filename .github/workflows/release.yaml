name: 🎉 Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  version:
    name: Calculate next version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - name: 📄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 🏷️ Calculate next version
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        id: tag
        # With default_bump: none, github-tag-action calls setFailed("Could not
        # increment version.") whenever no commit on the push warrants a release
        # (e.g. docs:/refactor:-only pushes). The publish job below is already
        # gated on `needs.version.outputs.tag != ''`, so the intended behaviour is
        # a green "no release" skip — not a red job. Tolerate the non-release
        # outcome here so a no-op push doesn't show a failed Release run on main.
        continue-on-error: true
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true
          default_bump: none

      - name: ⚠️ Surface a skipped release
        # continue-on-error above keeps the run green, which would otherwise also
        # hide a genuine github-tag-action error (e.g. an API outage) behind the
        # benign "no release warranted" case. Emit a warning annotation whenever
        # the step did not succeed so a skipped release stays visible in the run
        # summary rather than passing silently.
        if: steps.tag.outcome == 'failure'
        run: |
          echo "::warning title=Release skipped::No version tag was produced, so no release was published. This is expected for pushes that do not warrant a release (e.g. docs:/refactor:-only). If a release was expected, inspect the '🏷️ Calculate next version' step log for a genuine github-tag-action error."

  publish:
    name: Publish
    needs: version
    if: needs.version.outputs.tag != ''
    uses: ./.github/workflows/cd.yaml
    permissions:
      contents: write
    with:
      tag: ${{ needs.version.outputs.tag }}
